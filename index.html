<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhishGuard - Threat Intelligence Dashboard</title>
    <meta name="description" content="PhishGuard is an advanced threat intelligence dashboard for SOC analysts. Real-time phishing detection, API scanning, and cybersecurity analytics powered by Gemini AI." />
    <meta name="keywords" content="phishing detection, SOC dashboard, threat intelligence, cybersecurity, API scanner, malware analysis" />
    <meta name="author" content="Saichandram" />
    <meta property="og:title" content="PhishGuard - Threat Intelligence Dashboard" />
    <meta property="og:description" content="AI-powered SOC dashboard for threat intelligence, phishing detection, and deep URL analysis." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
      
      body {
        font-family: 'Inter', sans-serif;
        background-color: #020617; /* slate-950 */
        color: #f8fafc; /* slate-50 */
      }
      
      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }

      /* Custom Scrollbar for SOC feel */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0f172a; 
      }
      ::-webkit-scrollbar-thumb {
        background: #334155; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #475569; 
      }

      .glass-panel {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(148, 163, 184, 0.1);
      }
      
      .scan-line {
        position: absolute;
        width: 100%;
        height: 2px;
        background: linear-gradient(to right, transparent, #06b6d4, transparent);
        animation: scan 2s linear infinite;
        opacity: 0.5;
      }

      @keyframes scan {
        0% { top: 0%; }
        100% { top: 100%; }
      }
    </style>
